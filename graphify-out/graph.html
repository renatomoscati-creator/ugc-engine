  .nodeOpacity(0.92)
  .nodeLabel(() => '')
  .linkColor(l => l.color)
  .linkWidth(l => l.width)
  .linkOpacity(0.45)
  .linkDirectionalParticles(l => l.particles)
  .linkDirectionalParticleSpeed(0.003)
  .linkDirectionalParticleColor(l => l.color)
  .linkDirectionalParticleWidth(2)
  .d3AlphaDecay(0.02)
  .d3VelocityDecay(0.3)
  .onNodeClick(node => { showInfo(node); })
  .onNodeHover(node => { document.body.style.cursor = node ? 'pointer' : 'default'; });

// Defer camera/controls access to next tick — graph must finish setup first
setTimeout(() => {
  // Zoom toward pointer instead of center
  try { const c = Graph.controls(); if (c) c.zoomToCursor = true; } catch(e) {}

  // Lenient click: find biggest node within 5px of cursor
  const cam = Graph.camera();
  const cvs = Graph.renderer()?.domElement;
  if (!cvs || !cam) return;

  function _toScreen(nx, ny, nz) {
    const e = cam.matrixWorldInverse.elements;
    const vx=nx*e[0]+ny*e[4]+nz*e[8]+e[12], vy=nx*e[1]+ny*e[5]+nz*e[9]+e[13];
    const vz=nx*e[2]+ny*e[6]+nz*e[10]+e[14], vw=nx*e[3]+ny*e[7]+nz*e[11]+e[15];
    const p=cam.projectionMatrix.elements;
    const cx=vx*p[0]+vy*p[4]+vz*p[8]+vw*p[12];
    const cy=vx*p[1]+vy*p[5]+vz*p[9]+vw*p[13];
    const cw=vx*p[3]+vy*p[7]+vz*p[11]+vw*p[15];
    const r=cvs.getBoundingClientRect();
    return { x:(cx/cw*0.5+0.5)*r.width, y:(-cy/cw*0.5+0.5)*r.height };
  }

  cvs.addEventListener('click', e => {
    const r = cvs.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const hits = [];
    NODES.forEach(n => {
      if (n.x == null) return;
      const s = _toScreen(n.x, n.y, n.z || 0);
      if (Math.hypot(s.x - mx, s.y - my) <= 5) hits.push(n);
    });
    if (hits.length) {
      hits.sort((a, b) => (b.val || 0) - (a.val || 0));
      showInfo(hits[0]);
    }
  });
}, 0);

// Zoom to fit 1.5s after load — don't wait for engine to stop
setTimeout(() => Graph.zoomToFit(1200, 80), 1500);

// Subtle perpetual motion after physics settles
Graph.onEngineStop(() => {
  setInterval(() => {
    Graph.d3AlphaTarget(0.05).d3ReheatSimulation();
    setTimeout(() => Graph.d3AlphaTarget(0), 3000);
  }, 12000);
});

window.addEventListener('resize', () => {
  const el = document.getElementById('graph');
  Graph.width(el.offsetWidth).height(el.offsetHeight);
});

function showInfo(node) {
  if (!node) return;
  const neighborLinks = LINKS.filter(l => {
    const sid = l.source?.id ?? l.source;
    const tid = l.target?.id ?? l.target;
    return sid === node.id || tid === node.id;
  });
  const neighbors = neighborLinks.map(l => {
    const sid = l.source?.id ?? l.source;
    const tid = l.target?.id ?? l.target;
    return nodeMap[sid === node.id ? tid : sid];
  }).filter(Boolean);

  const neighborItems = neighbors.slice(0, 20).map(nb =>
    `<span class="neighbor-link" style="border-left-color:${esc(nb.color)}" onclick="focusNode(${JSON.stringify(nb.id)})">${esc(nb.label)}</span>`
  ).join('');

  document.getElementById('info-content').innerHTML = `
    <div class="field"><b>${esc(node.label)}</b></div>
    <div class="field">Type: ${esc(node.file_type || 'unknown')}</div>
    <div class="field">Community: ${esc(node.community_name)}</div>
    <div class="field">Source: ${esc(node.source_file || '-')}</div>
    <div class="field">Degree: ${node.degree}</div>
    ${neighbors.length ? `<div class="field" style="margin-top:8px;color:#444;font-size:11px">Neighbors (${neighbors.length})</div><div id="neighbors-list">${neighborItems}</div>` : ''}
  `;
}

function focusNode(nodeId) {
  const node = nodeMap[nodeId];
  if (!node) return;
  const dist = 180;
  const mag = Math.hypot(node.x || 0.01, node.y || 0.01, node.z || 0.01);
  const ratio = 1 + dist / mag;
  Graph.cameraPosition(
    { x: node.x * ratio, y: node.y * ratio, z: node.z * ratio },
    node, 800
  );
  showInfo(node);
}

const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = NODES.filter(n => n.label.toLowerCase().includes(q)).slice(0, 20);
  if (!matches.length) { searchResults.style.display = 'none'; return; }
  searchResults.style.display = 'block';
  matches.forEach(n => {
    const el = document.createElement('div');
    el.className = 'search-item';
    el.textContent = n.label;
    el.style.borderLeft = `3px solid ${n.color}`;
    el.style.paddingLeft = '8px';
    el.onclick = () => {
      focusNode(n.id);
      searchResults.style.display = 'none';
      searchInput.value = '';
    };
    searchResults.appendChild(el);
  });
});
document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput)
    searchResults.style.display = 'none';
});

const hiddenCommunities = new Set();
const legendEl = document.getElementById('legend');
LEGEND.forEach(c => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${c.color}"></div>
    <span class="legend-label">${c.label}</span>
    <span class="legend-count">${c.count}</span>`;
  item.onclick = () => {
    if (hiddenCommunities.has(c.cid)) {
      hiddenCommunities.delete(c.cid);
      item.classList.remove('dimmed');
    } else {
      hiddenCommunities.add(c.cid);
      item.classList.add('dimmed');
    }
    Graph.nodeVisibility(n => !hiddenCommunities.has(n.community));
    Graph.linkVisibility(l => {
      const sc = (nodeMap[l.source?.id ?? l.source] || {}).community;
      const tc = (nodeMap[l.target?.id ?? l.target] || {}).community;
      return !hiddenCommunities.has(sc) && !hiddenCommunities.has(tc);
    });
  };
  legendEl.appendChild(item);
});
</script>
</body>
